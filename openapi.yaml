openapi: "3.0.0"
info:
  title: "Code Generator Agent"
  version: "1.0.0"
  description: "Enterprise agent that generates new projects and edits existing GitHub repositories using your Prompt Hub as the coding standard."
servers:
  - url: "https://code-generator-wfye.onrender.com"
paths:
  /generate:
    post:
      summary: "Generate New Project"
      operationId: "generateProject"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - story
              properties:
                story:
                  type: string
                  description: "Story or specifications for the new project"
                  example: "Create a student management system with CRUD operations"
                limit:
                  type: integer
                  description: "Optional limit parameter"
                  example: 10
      responses:
        '200':
          description: "Success response containing generated project details"
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: "success"
                  project_name:
                    type: string
                    example: "StudentManagement"
                  project_path:
                    type: string
                    example: "generated_projects/StudentManagement"
                  zip_path:
                    type: string
                    example: "generated_projects/StudentManagement.zip"
                  write_results:
                    type: array
                    items:
                      type: object

  /edit:
    post:
      summary: "Edit Existing GitHub Repository"
      operationId: "editProject"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - repo_url
                - instructions
              properties:
                repo_url:
                  type: string
                  description: "Public GitHub repository URL to edit"
                  example: "https://github.com/spring-projects/spring-petclinic"
                instructions:
                  type: string
                  description: "Instructions describing what changes to make"
                  example: "Add a vehicle management module with CRUD APIs"
                limit:
                  type: integer
                  description: "Optional limit parameter"
                  example: 10
      responses:
        '200':
          description: "Success response containing edit result and PR details"
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: "success"
                  repo_name:
                    type: string
                    example: "spring-petclinic"
                  branch:
                    type: string
                    example: "feature/add-vehicle-management"
                  pr_url:
                    type: string
                    example: "https://github.com/user/repo/pull/1"
                  pr_success:
                    type: boolean
                    example: true
                  write_results:
                    type: array
                    items:
                      type: object

  /health:
    get:
      summary: "Health Check"
      operationId: "health"
      responses:
        '200':
          description: "Service is running"
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: "ok"
