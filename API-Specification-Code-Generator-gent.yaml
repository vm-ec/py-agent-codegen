openapi: "3.0.0"
info:
  title: "Code Generator Agent"
  version: "1.0.0"
  description: "Enterprise agent that generates new projects and edits existing GitHub repositories using your Prompt Hub as the coding standard."
servers:
  - url: "https://code-generator-wfye.onrender.com"
paths:
  /generate:
    post:
      summary: "Trigger Agent Node Action"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                story:
                  type: string
                limit:
                  type: integer
      responses:
        '200':
          description: "Success response containing dynamic output payload"

  /edit:
    post:
      summary: "Trigger Agent Node Action"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                repo_url:
                  type: string
                instructions:
                  type: string
                limit:
                  type: integer
      responses:
        '200':
          description: "Success response containing dynamic output payload"
